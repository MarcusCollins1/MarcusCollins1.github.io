<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <button class="return-button" id="returnBtn" onclick="window.location.href='../../games.html'">← Return</button>
    <h1>Mapominoes</h1>

    <h2>Name:</h2>
    <input type="text" id="nameInput" placeholder="Enter your name">

    <br>

    <form id="packsForm"></form>

    <ul id="gamePinsList"></ul>

    <button id="getGamesBtn" type="button">Reload</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            deleteField,
            onSnapshot,
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_CXSZVz6meJgcJyktktWNmPtLmeFNXn0",
            authDomain: "marcus-collins-github-website.firebaseapp.com",
            projectId: "marcus-collins-github-website",
            storageBucket: "marcus-collins-github-website.firebasestorage.app",
            messagingSenderId: "328004594228",
            appId: "1:328004594228:web:47074e07c446a328bbf861",
            measurementId: "G-6M9HBX4E3Z",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const packsForm = document.getElementById("packsForm");
        const getGamesBtn = document.getElementById("getGamesBtn");
        const gamePinsList = document.getElementById("gamePinsList");
        const nameInput = document.getElementById("nameInput");

        let packNames = [];
        let listenerStarted = false;

        function packsDocRef() {
            return doc(db, "Mapominoes", "Packs");
        }

        function gamesDocRef() {
            return doc(db, "Mapominoes", "Games");
        }

        function generateGamePin() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        async function ensureDocs() {
            const packsSnap = await getDoc(packsDocRef());
            if (!packsSnap.exists()) {
                await setDoc(packsDocRef(), { packs: [] });
            }

            const gamesSnap = await getDoc(gamesDocRef());
            if (!gamesSnap.exists()) {
                await setDoc(gamesDocRef(), {});
            }
        }

        function readSelectedPacks() {
            const selected = [];
            packsForm.querySelectorAll("input[type='checkbox']").forEach((checkbox) => {
                if (checkbox.checked) {
                    selected.push(checkbox.name);
                }
            });
            return selected;
        }

        function renderPackForm() {
            packsForm.innerHTML = "";

            const h2 = document.createElement("h2");
            h2.textContent = "Packs:";
            packsForm.appendChild(h2);

            if (packNames.length === 0) {
                const p = document.createElement("p");
                p.textContent = "No packs are available yet.";
                packsForm.appendChild(p);
            }

            packNames.forEach((packName) => {
                const wrapper = document.createElement("div");

                const checkbox = document.createElement("input");
                checkbox.id = `${packName}-checkbox`;
                checkbox.type = "checkbox";
                checkbox.name = packName;

                const label = document.createElement("label");
                label.htmlFor = `${packName}-checkbox`;
                label.textContent = packName;

                wrapper.appendChild(checkbox);
                wrapper.appendChild(label);
                packsForm.appendChild(wrapper);
            });

            const submitBtn = document.createElement("button");
            submitBtn.id = "submitBtn";
            submitBtn.type = "submit";
            submitBtn.textContent = "Create Game";
            packsForm.appendChild(submitBtn);
        }

        async function refreshPacks() {
            const snapshot = await getDoc(packsDocRef());
            if (!snapshot.exists()) {
                packNames = [];
            } else {
                const data = snapshot.data() ?? {};
                packNames = Array.isArray(data.packs) ? data.packs : [];
            }
            renderPackForm();
        }

        async function refreshGames() {
            const snapshot = await getDoc(gamesDocRef());
            const games = snapshot.exists() ? (snapshot.data() ?? {}) : {};

            gamePinsList.innerHTML = "";

            for (const [gamePin, gameData] of Object.entries(games)) {
                const players = Array.isArray(gameData.players) ? gameData.players : [];
                const playing = Boolean(gameData.playing);

                if (players.length === 0) {
                    await updateDoc(gamesDocRef(), {
                        [gamePin]: deleteField(),
                    });
                    continue;
                }

                if (playing) {
                    continue;
                }

                const li = document.createElement("li");
                const btn = document.createElement("button");
                btn.textContent = `Join Game ${gamePin} (${players.length} players)`;

                btn.addEventListener("click", async () => {
                    const name = nameInput.value.trim();
                    if (!name) {
                        alert("Please enter your name");
                        return;
                    }

                    if (players.includes(name)) {
                        alert("This name is taken in this game. Please choose another name.");
                        return;
                    }

                    await updateDoc(gamesDocRef(), {
                        [`${gamePin}.players`]: [...players, name],
                        [`${gamePin}.transits.${name}`]: 2,
                    });

                    window.localStorage.setItem("gamePin", gamePin);
                    window.localStorage.setItem("host", "false");
                    window.localStorage.setItem("name", name);
                    window.location.href = "./mapominoes.html";
                });

                li.appendChild(btn);
                gamePinsList.appendChild(li);
            }
        }

        async function startListener() {
            if (listenerStarted) {
                return;
            }
            listenerStarted = true;

            onSnapshot(gamesDocRef(), () => {
                void refreshGames();
            });
        }

        packsForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const name = nameInput.value.trim();
            if (!name) {
                alert("Please enter your name");
                return;
            }

            const selectedPacks = readSelectedPacks();
            if (selectedPacks.length === 0) {
                alert("You must select at least 1 pack");
                return;
            }

            const gamesSnap = await getDoc(gamesDocRef());
            const games = gamesSnap.exists() ? (gamesSnap.data() ?? {}) : {};

            let gamePin = generateGamePin();
            while (Object.hasOwn(games, gamePin)) {
                gamePin = generateGamePin();
            }

            const newGame = {
                players: [name],
                packs: selectedPacks,
                hands: {},
                transits: { [name]: 2 },
                board: {},
                startingCard: null,
                turn: 0,
                playing: false,
                finishedOrder: [],
            };

            await updateDoc(gamesDocRef(), {
                [gamePin]: newGame,
            });

            window.localStorage.setItem("gamePin", gamePin);
            window.localStorage.setItem("host", "true");
            window.localStorage.setItem("name", name);
            window.location.href = "./mapominoes.html";
        });

        getGamesBtn.addEventListener("click", () => {
            void refreshGames();
        });

        await ensureDocs();
        await refreshPacks();
        await refreshGames();
        await startListener();
    </script>
</body>
</html>
