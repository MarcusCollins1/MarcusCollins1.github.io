<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <button class="return-button" id="returnBtn" onclick="window.location.href='../../games.html'">← Return</button>
    <h1>Mapominoes</h1>

    <h2>Name:</h2>
    <input type="text" id="nameInput" placeholder="Enter your name">
    
    <br>

    <form id="packsForm"></form>

    <ul id="gamePinsList"></ul>

    <button onclick="getGames()">Reload</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_CXSZVz6meJgcJyktktWNmPtLmeFNXn0",
            authDomain: "marcus-collins-github-website.firebaseapp.com",
            projectId: "marcus-collins-github-website",
            storageBucket: "marcus-collins-github-website.firebasestorage.app",
            messagingSenderId: "328004594228",
            appId: "1:328004594228:web:47074e07c446a328bbf861",
            measurementId: "G-6M9HBX4E3Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        const packsForm = document.getElementById("packsForm");

        let nameInput = document.getElementById("nameInput");
        let packNames = [];

        async function getGames() {
            const gamesRef = doc(db, "Mapominoes", "Games");
            const snapshot = await getDoc(gamesRef);
            const games = snapshot.data();
            console.log(games);
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const packsRef = doc(db, "Mapominoes", "Packs");
            const snapshot = await getDoc(packsRef);
            
            packNames = snapshot.data().packs;

            populatePacksForm();
        });

        packsForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (nameInput.value.trim() === "") {
                alert("Please enter your name");
                return;
            }

            let formData = {};
            packsForm.querySelectorAll("input[type='checkbox']").forEach(checkBox => {
                formData[checkBox.name] = checkBox.checked ? true : false;
            });
            if (!Object.values(formData).some(value => value)) {
                alert("You must select at least 1 pack");
                return;
            }
            formData["name"] = nameInput.value.trim();

            let gamePin;
            while (true) {
                gamePin = generateGamePin();
                const gameRef = doc(db, "Mapominoes", "Games");
                const snapshot = await getDoc(gameRef);
                
            }
            console.log(formData);

            window.localStorage.setItem("gamePin", gamePin);
            window.localStorage.setItem("host", true);
            window.localStorage.setItem("name", nameInput.value);
            window.location.href = "./mapominoes.html";
        });

        function populatePacksForm() {
            packsForm.innerHTML = "";
            const packsH2 = document.createElement("h2");
            packsH2.textContent = "Packs:";
            packsForm.appendChild(packsH2);
            packNames.forEach(packName => {
                const packCheckBox = document.createElement("input");
                packCheckBox.id = `${packName}-checkbox`;
                packCheckBox.type = "checkbox";
                packCheckBox.name = packName;
                packsForm.appendChild(packCheckBox);
                const packLabel = document.createElement("label");
                packLabel.htmlFor = `${packName}-checkbox`;
                packLabel.textContent = packName;
                packsForm.appendChild(packLabel);
                packsForm.appendChild(document.createElement("br"));
            });
            const submitBtn = document.createElement("button");
            submitBtn.id = "submitBtn";
            submitBtn.textContent = "Create Game";
            packsForm.appendChild(submitBtn);
        }
        
        function generateGamePin() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }
    </script>
</body>
</html>
