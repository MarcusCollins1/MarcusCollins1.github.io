<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        :root{
            --bg:#0f1724;
            --card:#0b1220;
            --accent:#60a5fa;
            --success:#34d399;
            --danger:#fb7185;
            --muted:#94a3b8;
            --glass: rgba(255,255,255,0.03);
            font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }
        *{box-sizing: border-box}
        body{
            margin: 0;
            background: linear-gradient(180deg,var(--bg) 0%, #071029 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card{
            width: 100%;
            max-width: 720px;
            background: linear-gradient(180deg,var(--card),rgba(11,18,32,0.8));
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(2,6,23,0.7);
            backdrop-filter: blur(6px);
        }
        header{display: flex;align-items: center;gap: 12px;margin-bottom: 12px;}
        header h1{font-size:1.1rem;margin: 0;}
        .row{display: flex;gap: 12px;flex-wrap: wrap;}
        label{font-size: 0.85rem;color: var(--muted);}
        input[type="number"], input[type="text"]{
            appearance: none;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: var(--glass);
            color: inherit;
            font-size: 1rem;
            min-width: 0;
        }
        .controls{display: flex;gap: 12px;align-items: center;}
        button{
            cursor: pointer;
            border: 0;
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--accent);
            color: #04263b;
            font-weight: 600;
        }
        button.ghost{
            background: transparent;
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--muted);
        }
        .status{
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            color: var(--muted);
        }
        .big{
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
            margin-top: 18px;
        }
        .big .hint{margin-top: 12px;display: flex;gap: 8px;flex-wrap: wrap;}
        .chip{padding: 6px 10px; border-radius: 999px;background: rgba(255,255,255,0.03);font-size: 0.85rem;}
        footer{
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .success{color: var(--success);}
        .danger{color: var(--danger);}
        @media (max-width: 520px){
            .big{flex-direction: column;align-items: stretch;gap: 8px;}
            header{flex-direction: column;align-items: flex-start;}
        }
    </style>
</head>
<body>
    <main class="card" id="app">
        <header>
            <h1>🔢 Number Guessing Game</h1>
            <div style="margin-left:auto;color:var(--muted);font-size:0.9rem">Guess the number — range 1 to 100 by default</div>
        </header>

        <!-- Settings -->
        <section class="row" aria-label="settings" style="gap: 10px;">
            <div>
                <label for="min">Min</label><br>
                <input id="min" type="number" value="1" min="-100000"/>
            </div>
            <div>
                <label for="max">Max</label><br>
                <input id="max" type="number" value="100" min="-100000"/>
            </div>
            <div class="controls" style="margin-left: auto;">
                <button id="newRange">Start / Apply Range</button>
                <button id="resetAll" class="ghost" title="Reset stored best score">Reset Best</button>
            </div>
        </section>
        
        <!-- Game input -->
        <section style="margin-top: 16px;">
            <div class="row" style="align-items: center;">
                <div style="flex: 1;">
                    <label for="guess">Your guess</label><br>
                    <input id="guess" type="number" placeholder="Enter a number" />
                </div>
                <div style="display:flex;gap:8px;align-items:end">
                    <button id="submit">Guess</button>
                    <button id="hint" class="ghost">Hint</button>
                </div>
            </div>

            <div class="status" id="status" role="status" aria-live="polite">
                <div>Attempts: <span id="attempts">0</span> &nbsp; • &nbsp; Best (fewest attempts): <span id="best">—</span></div>
            </div>

            <div class="big">
                <div class="hint" id="message">Make a guess to begin!</div>
                <div style="text-align: right;">
                    <div style="font-size: 0.9rem;color: var(--muted);">Past Guesses:</div>
                    <div class="guesses" id="past"></div>
                </div>
            </div>

            <footer>
                <div class="muted">Tip: press Enter to submit. Range is inclusive.</div>
                <div>
                    <button id="playAgain" class="ghost">Play Again</button>
                </div>
            </footer>
        </section>
    </main>
    <script src="numberGuessingGame.js"></script>
</body>
</html>
