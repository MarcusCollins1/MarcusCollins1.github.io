<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes</title>
    <link rel="stylesheet" href="quizzes.css">
</head>
<body>
    <button id="returnBtn" class="return-button" onclick="location.href='index.html'">← Return</button>
    <h1>Quizzes</h1>

    <div class="button-group">
        <button class="main-button" id="2024QuizBtn" onclick="location.href='Quizzes/2024/quiz.html'">2024</button>

        <div class="extra-buttons">
            <button id="editBtn" onclick="location.href='Quizzes/2024/edit.html'">Edit</button>
            <button id="markBtn" onclick="location.href='Quizzes/2024/mark.html'">Mark</button>
            <button id="leaderboardBtn" onclick="location.href='Quizzes/2024/leaderboard.html'">Leaderboard</button>
            <button id="deleteBtn" onclick="location.href='Quizzes/2024/delete.html'">Delete</button>
        </div>
    </div>

    <script>
        const groups = document.querySelectorAll(".button-group");
        groups.forEach(group => {
            const mainBtn = group.querySelector(".main-button");
            mainBtn.addEventListener("mouseenter", () => {
                group.classList.add("open");
            });
            group.addEventListener("mouseleave", () => {
                group.classList.remove("open");
            });
        });
    </script>
</body>
</html>
